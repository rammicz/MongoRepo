name: Build and Test

# Builds the solution and runs the xUnit test suite on every push and pull
# request. A failing test fails the job (dotnet test returns a non-zero exit
# code), gating the change before it can be released.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build MongoRepo.sln -c Release

      - name: Test
        run: dotnet test Application/MongoTypeRepository.Tests/MongoTypeRepository.Tests.csproj -c Release --no-build
